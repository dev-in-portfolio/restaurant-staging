name: Temporary fix map placeholder labels

on:
  pull_request:
    paths:
      - '.github/workflows/fix-map-placeholder-labels.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest staging main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Replace visible placeholder wording
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          changes = {
              Path('restaurants/house-of-leng/contact.html'): (
                  '            <div class="map-placeholder">\n              Map placeholder — 2712 W Mallard Creek Church Rd #430, Charlotte, NC 28262\n            </div>',
                  '            <div class="map-placeholder" aria-label="Location directions">\n              Location preview — 2712 W Mallard Creek Church Rd #430, Charlotte, NC 28262. Use the Google Maps link above for turn-by-turn directions.\n            </div>',
              ),
              Path('restaurants/laurel-market/contact.html'): (
                  '                <p style="font-size:0.85rem;">Map placeholder &mdash; embed Google Maps here</p>',
                  '                <p style="font-size:0.85rem;">Location preview &mdash; use the verified address above or the official map service for directions.</p>',
              ),
          }

          for path, (old, new) in changes.items():
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected text not found in {path}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          for path in changes:
              text = path.read_text(encoding='utf-8')
              visible = text.replace('class="map-placeholder"', '').replace('class="map-placeholder" aria-label="Location directions"', '')
              if 'Map placeholder' in visible:
                  raise SystemExit(f'Visible placeholder wording remains in {path}')
              print(f'Updated {path}')
          PY

      - name: Validate affected staging builds
        shell: bash
        run: |
          set -euo pipefail
          npm test --if-present
          npm run validate -- --restaurant house-of-leng
          npm run validate -- --restaurant laurel-market

      - name: Commit and push to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'OpenAI'
          git config user.email 'noreply@openai.com'
          git add restaurants/house-of-leng/contact.html restaurants/laurel-market/contact.html
          git commit -m 'Replace two visible map placeholder labels'
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
          git rev-parse HEAD
