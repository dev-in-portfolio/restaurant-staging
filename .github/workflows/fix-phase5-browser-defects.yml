name: Temporary fix Phase 5 browser defects

on:
  pull_request:
    paths:
      - '.github/workflows/fix-phase5-browser-defects.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest staging main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply targeted browser fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path

          amina = Path('restaurants/amina/visit.html')
          text = amina.read_text(encoding='utf-8')
          replacement = '''<div class="map-embed" role="group" aria-label="Amina location preview">
            <div style="min-height:260px;display:grid;place-items:center;text-align:center;padding:2rem;border:1px solid rgba(127,127,127,.3);border-radius:12px;">
              <div>
                <h2 style="margin:0 0 .75rem;">Location Preview</h2>
                <p style="margin:0 0 1rem;">225 East 6th Street, Suite C<br>Charlotte, NC 28202</p>
                <a href="https://maps.google.com/?q=225+East+6th+Street+Suite+C+Charlotte+NC+28202" target="_blank" rel="noopener" class="btn btn-outline">Open in Google Maps</a>
              </div>
            </div>
          </div>'''
          updated, count = re.subn(r'<div class="map-embed">\s*<iframe[\s\S]*?</iframe>\s*</div>', replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Amina map embed replacement count was {count}')
          amina.write_text(updated, encoding='utf-8')

          curry = Path('restaurants/curry-gate/spice.html')
          text = curry.read_text(encoding='utf-8')
          curry_fix = '''
    <style data-phase5-mobile-fix>
      @media (max-width: 600px) {
        html, body { max-width: 100%; overflow-x: clip; }
        .interactive-panel { padding: 28px 16px !important; }
        .catering-grid { grid-template-columns: minmax(0, 1fr) !important; gap: 20px !important; }
        .catering-grid > * { min-width: 0; max-width: 100%; }
        .spice-mat { padding: 2rem 1rem; }
        select { min-width: 0; max-width: 100%; }
      }
    </style>
'''
          if 'data-phase5-mobile-fix' not in text:
              text = text.replace('</head>', curry_fix + '</head>', 1)
          curry.write_text(text, encoding='utf-8')

          gus = Path('restaurants/gus-restaurant/greek.html')
          text = gus.read_text(encoding='utf-8')
          gus_fix = '''
<style data-phase5-mobile-fix>
@media (max-width: 600px) {
  html, body { max-width: 100%; overflow-x: clip; }
  main.container { width: 100%; max-width: 100%; min-width: 0; padding-left: 1rem; padding-right: 1rem; }
  .interactive-panel { padding: 28px 16px !important; max-width: 100%; min-width: 0; }
  .greek-grid { grid-template-columns: minmax(0, 1fr); min-width: 0; max-width: 100%; gap: 20px; }
  .greek-grid > * { min-width: 0; max-width: 100%; }
  .greek-mat { padding: 2rem 1rem; }
  select { min-width: 0; max-width: 100%; }
}
</style>
'''
          if 'data-phase5-mobile-fix' not in text:
              text = text.replace('</head>', gus_fix + '</head>', 1)
          gus.write_text(text, encoding='utf-8')

          print('Applied targeted fixes to Amina, Curry Gate, and Gus.')
          PY

      - name: Run staging validation
        shell: bash
        run: |
          set -euo pipefail
          npm test --if-present
          npm run validate -- --restaurant amina
          npm run validate -- --restaurant curry-gate
          npm run validate -- --restaurant gus-restaurant

      - name: Install targeted browser QA runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/phase5-targeted
          cd /tmp/phase5-targeted
          npm init -y >/dev/null
          npm install --no-audit --no-fund playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null

      - name: Run targeted desktop tablet and mobile QA
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 >/tmp/phase5-targeted-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          sleep 2
          NODE_PATH=/tmp/phase5-targeted/node_modules node - <<'JS'
          const { chromium } = require('playwright');
          const targets = [
            'restaurants/amina/visit.html',
            'restaurants/curry-gate/spice.html',
            'restaurants/gus-restaurant/greek.html',
          ];
          const viewports = [
            {name:'desktop', width:1440, height:900},
            {name:'tablet', width:1024, height:768},
            {name:'mobile', width:390, height:844},
          ];
          (async () => {
            const browser = await chromium.launch({headless:true});
            const failures = [];
            for (const target of targets) {
              for (const viewport of viewports) {
                const page = await browser.newPage({viewport:{width:viewport.width,height:viewport.height}});
                const errors = [];
                page.on('pageerror', e => errors.push(`pageerror: ${e.message}`));
                page.on('console', msg => {
                  if (msg.type() === 'error' && !/favicon/i.test(msg.text())) errors.push(`console: ${msg.text()}`);
                });
                const response = await page.goto(`http://127.0.0.1:4173/${target}`, {waitUntil:'networkidle', timeout:30000});
                const layout = await page.evaluate(() => ({scrollWidth:document.documentElement.scrollWidth,clientWidth:document.documentElement.clientWidth}));
                if (!response || !response.ok()) failures.push(`${target} ${viewport.name}: HTTP ${response?.status()}`);
                if (layout.scrollWidth > layout.clientWidth + 3) failures.push(`${target} ${viewport.name}: overflow ${layout.scrollWidth}/${layout.clientWidth}`);
                errors.forEach(error => failures.push(`${target} ${viewport.name}: ${error}`));
                await page.close();
              }
            }
            await browser.close();
            console.log(JSON.stringify({loads:9, failures}, null, 2));
            if (failures.length) process.exit(1);
          })().catch(error => { console.error(error); process.exit(1); });
          JS

      - name: Commit and push to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'OpenAI'
          git config user.email 'noreply@openai.com'
          git add restaurants/amina/visit.html restaurants/curry-gate/spice.html restaurants/gus-restaurant/greek.html
          git commit -m 'Fix three Phase 5 browser QA defects'
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
          git rev-parse HEAD
