name: Temporary Phase 4 sync 41

on:
  pull_request:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out controller branch
        uses: actions/checkout@v4
        with:
          path: controller

      - name: Check out latest staging main
        uses: actions/checkout@v4
        with:
          repository: dev-in-portfolio/restaurant-staging
          ref: main
          fetch-depth: 0
          path: staging

      - name: Check out latest repaired source main
        uses: actions/checkout@v4
        with:
          repository: dev-in-portfolio/restaurants
          ref: main
          fetch-depth: 0
          path: source

      - name: Verify Phase 2 source commit is present
        shell: bash
        run: |
          set -euo pipefail
          git -C source merge-base --is-ancestor 2bd7924130a4dd86bc61217a5ff6119283f72306 HEAD
          echo "Source SHA: $(git -C source rev-parse HEAD)"
          echo "Staging SHA: $(git -C staging rev-parse HEAD)"

      - name: Synchronize 41 repaired builds and staging routes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          python3 controller/.github/scripts/phase4-sync.py 2>&1 | tee out/phase4-sync.log

      - name: Validate all 41 staging builds
        shell: bash
        working-directory: staging
        run: |
          set -euo pipefail
          slugs=(
            aj-family-restaurant alice-jules-coffee-house amina anatolia-cafe-and-cuisine food-soul
            hathaways-fried-chicken house-of-leng kits-trackside-crafts lang-van laurel-market
            le-kebab-grill les-sandwiches-cafe machu-picchu matthews-social-house miguels-restaurant
            mj-donuts picadelis-pub-in-deli queens-soul republica the-dive-n palace-monroe portrait-gallery
            dbs-tavern doans-vietnamese-cuisine dolce-osteria east-74-restaurant el-valle-mexican-restaurant
            geno-ds-pizza giddy-goat-coffee-roasters gotcha-matcha-espresso greys-diner
            deejai-thai devils-logic-brewing doms-dive-bar dozo-japanese-american-kitchen dukes-grill
            fenians-keep flour-shop harpers-cafe lula-banh-mi-and-bakery marias-mexican-restaurant
          )
          for slug in "${slugs[@]}"; do
            npm run validate -- --restaurant "$slug"
          done 2>&1 | tee ../out/phase4-validation.log
          npm test --if-present 2>&1 | tee ../out/phase4-tests.log

      - name: Install browser QA runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/phase4-qa
          cd /tmp/phase4-qa
          npm init -y >/dev/null
          npm install --no-audit --no-fund playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null

      - name: Run staging browser QA
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --directory staging >/tmp/phase4-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          sleep 2
          NODE_PATH=/tmp/phase4-qa/node_modules node controller/.github/scripts/phase4-browser.js 2>&1 | tee out/phase4-browser.log

      - name: Commit and push synchronized builds to staging main
        shell: bash
        working-directory: staging
        run: |
          set -euo pipefail
          git config user.name 'OpenAI'
          git config user.email 'noreply@openai.com'
          git add restaurants
          if git diff --cached --quiet; then
            echo 'No Phase 4 staging changes were needed.' | tee ../out/commit.txt
            exit 0
          fi
          git commit -m 'Synchronize 41 repaired restaurant builds into staging'
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
          git rev-parse HEAD | tee ../out/commit.txt

      - name: Upload Phase 4 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-sync-41-report
          path: out
